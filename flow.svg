<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" font-family="Arial, Helvetica, sans-serif">
  <rect width="820" height="520" fill="#0d0d0d" rx="12"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" fill="#c8a25a" font-size="13" font-weight="600" letter-spacing="2">HOW IT WORKS</text>

  <!-- ── STEP 1: Get Token ── -->
  <rect x="310" y="58" width="200" height="52" rx="8" fill="#1a1a1a" stroke="#c8a25a" stroke-width="1.5"/>
  <text x="410" y="79" text-anchor="middle" fill="#c8a25a" font-size="11" font-weight="700" letter-spacing="1">STEP 1</text>
  <text x="410" y="98" text-anchor="middle" fill="#e8e8e8" font-size="13">Get your free Discogs token</text>

  <!-- Arrow down -->
  <line x1="410" y1="110" x2="410" y2="138" stroke="#333" stroke-width="1.5"/>
  <polygon points="410,142 405,133 415,133" fill="#333"/>

  <!-- ── STEP 2: Split ── -->
  <rect x="310" y="142" width="200" height="44" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="410" y="161" text-anchor="middle" fill="#c8a25a" font-size="11" font-weight="700" letter-spacing="1">STEP 2</text>
  <text x="410" y="178" text-anchor="middle" fill="#e8e8e8" font-size="13">Find your record</text>

  <!-- Split arrows -->
  <!-- Left branch -->
  <line x1="310" y1="164" x2="180" y2="164" stroke="#333" stroke-width="1.5"/>
  <line x1="180" y1="164" x2="180" y2="228" stroke="#333" stroke-width="1.5"/>
  <polygon points="180,232 175,223 185,223" fill="#333"/>
  <!-- Right branch -->
  <line x1="510" y1="164" x2="640" y2="164" stroke="#333" stroke-width="1.5"/>
  <line x1="640" y1="164" x2="640" y2="228" stroke="#333" stroke-width="1.5"/>
  <polygon points="640,232 635,223 645,223" fill="#333"/>

  <!-- Left: Search -->
  <rect x="90" y="232" width="180" height="56" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Search icon -->
  <circle cx="122" cy="256" r="8" fill="none" stroke="#c8a25a" stroke-width="1.5"/>
  <line x1="128" y1="262" x2="134" y2="268" stroke="#c8a25a" stroke-width="1.5" stroke-linecap="round"/>
  <text x="180" y="254" text-anchor="middle" fill="#e8e8e8" font-size="13">Search Discogs</text>
  <text x="180" y="272" text-anchor="middle" fill="#666" font-size="11">by artist or album</text>

  <!-- Right: Scan -->
  <rect x="550" y="232" width="180" height="56" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Barcode icon -->
  <rect x="580" y="248" width="3" height="22" fill="#c8a25a"/>
  <rect x="585" y="248" width="2" height="22" fill="#c8a25a"/>
  <rect x="589" y="248" width="4" height="22" fill="#c8a25a"/>
  <rect x="595" y="248" width="2" height="22" fill="#c8a25a"/>
  <rect x="599" y="248" width="3" height="22" fill="#c8a25a"/>
  <text x="660" y="258" text-anchor="middle" fill="#e8e8e8" font-size="13">Scan Barcode</text>
  <text x="660" y="276" text-anchor="middle" fill="#666" font-size="11">point camera at sleeve</text>

  <!-- Converge arrows to Step 3 -->
  <line x1="180" y1="288" x2="180" y2="318" stroke="#333" stroke-width="1.5"/>
  <line x1="180" y1="318" x2="340" y2="318" stroke="#333" stroke-width="1.5"/>
  <line x1="640" y1="288" x2="640" y2="318" stroke="#333" stroke-width="1.5"/>
  <line x1="640" y1="318" x2="480" y2="318" stroke="#333" stroke-width="1.5"/>
  <line x1="410" y1="318" x2="410" y2="330" stroke="#333" stroke-width="1.5"/>
  <polygon points="410,334 405,325 415,325" fill="#333"/>

  <!-- ── STEP 3: Metadata ── -->
  <rect x="270" y="334" width="280" height="60" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="410" y="353" text-anchor="middle" fill="#c8a25a" font-size="11" font-weight="700" letter-spacing="1">STEP 3</text>
  <text x="410" y="370" text-anchor="middle" fill="#e8e8e8" font-size="13">Metadata auto-filled</text>
  <text x="410" y="386" text-anchor="middle" fill="#666" font-size="11">artist · label · year · cover · market value</text>

  <!-- Arrow down -->
  <line x1="410" y1="394" x2="410" y2="414" stroke="#333" stroke-width="1.5"/>
  <polygon points="410,418 405,409 415,409" fill="#333"/>

  <!-- ── STEP 4: Add to Vault ── -->
  <rect x="310" y="418" width="200" height="44" rx="8" fill="#c8a25a"/>
  <text x="410" y="437" text-anchor="middle" fill="#0d0d0d" font-size="11" font-weight="700" letter-spacing="1">STEP 4</text>
  <text x="410" y="454" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Add to your vault</text>

  <!-- Bottom branches -->
  <line x1="310" y1="440" x2="170" y2="440" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="440" x2="170" y2="490" stroke="#333" stroke-width="1.5"/>
  <line x1="510" y1="440" x2="650" y2="440" stroke="#333" stroke-width="1.5"/>
  <line x1="650" y1="440" x2="650" y2="490" stroke="#333" stroke-width="1.5"/>

  <!-- Export JSON -->
  <rect x="90" y="490" width="160" height="20" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="170" y="504" text-anchor="middle" fill="#666" font-size="11">Export JSON / CSV</text>

  <!-- Merge -->
  <rect x="570" y="490" width="160" height="20" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="650" y="504" text-anchor="middle" fill="#666" font-size="11">Merge from other devices</text>

  <!-- Bottom center: collection -->
  <line x1="410" y1="462" x2="410" y2="490" stroke="#333" stroke-width="1.5"/>
  <rect x="320" y="490" width="180" height="20" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="410" y="504" text-anchor="middle" fill="#666" font-size="11">Browse &amp; sort your collection</text>

  <!-- Footer -->
  <text x="410" y="518" text-anchor="middle" fill="#333" font-size="10">vinylvault · lu31.com</text>
</svg>
